<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Página não encontrada</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary-color: #FF6B35;
      --background: #FFF9F2;
      --neon: #FF6B35;
    }

    body {
      background: var(--background) url('data:image/svg+xml,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" opacity="0.05"><circle cx="50" cy="50" r="40" stroke="%23FF6B35" fill="none"/></svg>');
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      padding: 20px;
    }

    .error-container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(255, 107, 53, 0.2);
      max-width: 600px;
      position: relative;
      overflow: hidden;
    }

    .error-code {
      font-size: 120px;
      font-weight: 900;
      color: var(--primary-color);
      text-shadow: 2px 2px 10px rgba(255, 107, 53, 0.3);
      margin: 20px 0;
      position: relative;
    }

    .error-code::after {
      content: '🛒';
      position: absolute;
      right: -30px;
      top: -10px;
      font-size: 60px;
      animation: cart 2s ease-in-out infinite;
    }

    .error-message {
      font-size: 26px;
      color: var(--primary-color);
      margin: 20px 0;
      font-weight: 700;
    }

    .instruction {
      color: #666;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto 25px;
    }

    .food-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
    }

    .food-icon {
      font-size: 32px;
      animation: float 3s ease-in-out infinite;
    }

    .food-icon:nth-child(2) {
      animation-delay: 0.2s;
    }

    .food-icon:nth-child(3) {
      animation-delay: 0.4s;
    }

    .food-icon:nth-child(4) {
      animation-delay: 0.6s;
    }

    .btn-home {
      position: relative;
      display: inline-block;
      padding: 14px 32px;
      border-radius: 50px;
      background-color: white;
      color: var(--primary-color);
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      border: 2px solid var(--primary-color);
      overflow: hidden;
      transition: color 0.3s ease;
      z-index: 1;
    }

    .btn-home::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background-color: var(--primary-color);
      transition: left 0.8s ease;
      z-index: 0;
    }

    .btn-home:hover::before {
      left: 0;
    }

    .btn-home:hover {
      color: white;
    }

    .btn-home span {
      position: relative;
      z-index: 1;
    }


    @keyframes cart {
      0%, 100% { transform: translateX(0) rotate(-10deg); }
      50% { transform: translateX(10px) rotate(10deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 600px) {
      .error-code {
        font-size: 80px;
      }

      .error-message {
        font-size: 20px;
      }

      .btn-home {
        width: 100%;
        font-size: 1rem;
      }

      .food-icons {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <div class="error-message">Página não encontrada!</div>

    <div class="food-icons">
      <div class="food-icon">🥕</div>
      <div class="food-icon">🍎</div>
      <div class="food-icon">🥖</div>
      <div class="food-icon">🥛</div>
    </div>

    <p class="instruction">
      Oops! Parece que esse corredor do supermercado está vazio.<br>
      Verifique o endereço digitado ou volte para o início.
    </p>

    <a href="/" class="btn-home"><span>Voltar para o mercado</span></a>
  </div>
</body>
</html>
